<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Defs</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#040404;
      --card:rgba(255,255,255,0.025);
      --border:rgba(255,255,255,0.05);
      --text:#f5f5f5;
      --muted:#6d6d6d;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Share Tech Mono',monospace;
      min-height:100vh;
      overflow-x:hidden;
      display:flex;
      justify-content:center;
      padding:70px 20px;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top right, rgba(255,255,255,0.05), transparent 35%),
      radial-gradient(circle at bottom left, rgba(255,255,255,0.03), transparent 35%);
      pointer-events:none;
    }

    .container{
      width:100%;
      max-width:480px;
      position:relative;
      z-index:2;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .title{
      font-size:40px;
      font-weight:600;
      letter-spacing:-2px;
      margin-bottom:32px;
      text-align:center;
      opacity:0;
      animation:title 1s forwards;
    }

    @keyframes title{
      from{
        opacity:0;
        transform:translateY(-15px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .defs{
      display:flex;
      flex-direction:column;
      gap:10px;
      width:100%;
      align-items:center;
    }

    .def{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:15px 18px;
      font-size:14px;
      color:#d8d8d8;
      backdrop-filter:blur(10px);
      opacity:0;
      transform:translateY(12px);
      animation:appear .45s forwards;
      transition:.25s ease;
      width:100%;
      text-align:center;
      max-width:320px;
    }

    .def:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      color:white;
      box-shadow:0 0 25px rgba(255,255,255,0.03);
    }

    .def{
      color:#d8d8d8;
    }

    @keyframes appear{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .bottom{
      margin-top:32px;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
    }

    .footer{
      color:var(--muted);
      font-size:12px;
      text-align:center;
      letter-spacing:1px;
    }

    .discord{
      text-decoration:none;
      color:#d7d7d7;
      font-size:13px;
      padding:12px 18px;
      border-radius:14px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      transition:.25s ease;
    }

    .discord:hover{
      background:rgba(255,255,255,0.05);
      border-color:rgba(255,255,255,0.12);
      color:white;
      transform:translateY(-2px);
    }

    @media(max-width:600px){
      .title{
        font-size:34px;
      }

      .def{
        font-size:13px;
      }
    }

  </style>
</head>
